services:
  mtr-dash:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - mtr-data:/data
      - ./.GeoIP.conf:/app/GeoIP.conf:ro
    environment:
      - GEOIP_CONF_PATH=/app/GeoIP.conf
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped

volumes:
  mtr-data:

networks:
  default:
    enable_ipv6: true
