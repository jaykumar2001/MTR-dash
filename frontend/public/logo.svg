<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring — subtle double stroke in the accent orange -->
  <circle cx="60" cy="60" r="56" stroke="#e8622c" stroke-width="2.5" stroke-opacity="0.35"/>
  <circle cx="60" cy="60" r="56" stroke="#e8622c" stroke-width="0.8" stroke-opacity="0.7"/>

  <!-- Current route: source -> hop -> destination -->
  <line x1="36" y1="84" x2="50" y2="54" stroke="#e8622c" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="50" y1="54" x2="84" y2="30" stroke="#e8622c" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Deviation route (route change history) — dashed teal -->
  <line x1="36" y1="84" x2="78" y2="68" stroke="#2fb8c9" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <line x1="78" y1="68" x2="84" y2="30" stroke="#2fb8c9" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>

  <!-- Source node (probe origin) -->
  <circle cx="36" cy="84" r="8" fill="#ede7da" fill-opacity="0.08" stroke="#ede7da" stroke-width="1.5"/>
  <circle cx="36" cy="84" r="3.5" fill="#ede7da"/>

  <!-- Intermediate hop -->
  <circle cx="50" cy="54" r="8" fill="#e8622c" fill-opacity="0.12" stroke="#e8622c" stroke-width="1.5"/>
  <circle cx="50" cy="54" r="3.5" fill="#e8622c"/>

  <!-- Deviation hop -->
  <circle cx="78" cy="68" r="7" fill="#2fb8c9" fill-opacity="0.1" stroke="#2fb8c9" stroke-width="1.5"/>
  <circle cx="78" cy="68" r="3" fill="#2fb8c9"/>

  <!-- Destination node -->
  <circle cx="84" cy="30" r="10" fill="#ff7a3d" fill-opacity="0.12" stroke="#ff7a3d" stroke-width="2"/>
  <circle cx="84" cy="30" r="4" fill="#ff7a3d"/>

  <!-- Per-hop latency bars -->
  <rect x="48" y="98" width="5" height="10" rx="1.2" fill="#e8622c" fill-opacity="0.55"/>
  <rect x="55" y="94" width="5" height="14" rx="1.2" fill="#e8622c" fill-opacity="0.75"/>
  <rect x="62" y="96" width="5" height="12" rx="1.2" fill="#e8622c" fill-opacity="0.65"/>
</svg>
